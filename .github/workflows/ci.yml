name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight runs for a PR when a new commit lands. `main` pushes
  # are never cancelled so the post-merge build always completes.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv pip install ruff
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  typecheck:
    name: Typecheck (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv pip install -e ".[test,dev]"
      # `error-on-warning` is set in [tool.ty.terminal] so the run fails
      # on any diagnostic, matching the strictness we had with mypy.
      - run: uv run ty check src/hermetic

  test:
    name: Test (py${{ matrix.python }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # Bookend macOS coverage: oldest + newest supported Python. Full
          # matrix on macOS roughly triples CI minutes for minimal marginal
          # signal — bugs tend to be OS-specific or Python-version-specific
          # independently.
          - os: macos-latest
            python: "3.10"
          - os: macos-latest
            python: "3.14"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv pip install -e ".[test]"
      - run: uv run pytest -v

  coverage:
    name: Coverage (gate at 80%)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv pip install -e ".[test]"
      - run: uv run pytest --cov=hermetic --cov-report=term-missing --cov-fail-under=80
