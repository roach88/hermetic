version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    # Only auto-PR minor + patch bumps, grouped into one PR.
    # Major bumps are handled manually so breaking changes get real review.
    groups:
      python-dev-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      gha-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
